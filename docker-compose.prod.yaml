services:
  app:
    image: registry.gitlab.com/sergeshorace1986/devops-project:${IMAGE_TAG}
    container_name: frontend-production
    ports:
      - "80:3000"
    env_file:
      - .env.production
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
