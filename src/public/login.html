<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      :root {
        --bg: #0f1a24;
        --card: #172634;
        --accent: #f2b632;
        --text: #e7edf3;
        --muted: #9fb0c0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
        background: radial-gradient(1200px 600px at 10% 10%, #1f3650 0%, var(--bg) 55%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: linear-gradient(160deg, #1b2d3e 0%, var(--card) 100%);
        border: 1px solid #22364a;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0.4px;
      }
      p {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 14px;
      }
      label {
        display: block;
        margin: 12px 0 6px;
        font-size: 13px;
        color: var(--muted);
      }
      input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #284056;
        background: #0f1f2c;
        color: var(--text);
        outline: none;
      }
      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(242, 182, 50, 0.2);
      }
      .actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 18px;
      }
      .actions a {
        color: var(--muted);
        text-decoration: none;
        font-size: 12px;
      }
      button {
        border: 0;
        background: var(--accent);
        color: #1a1a1a;
        padding: 12px 18px;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
      }
      .note {
        margin-top: 16px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Willkommen zur Anmeldung</h1>
      <p>Melde dich mit deinen Zugangsdaten an.</p>
      <form method="post" action="/login">
        <label for="email">E-Mail</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />
        <label for="password">Passwort</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required />
        <div class="actions">
          <a href="#">Passwort vergessen?</a>
          <button type="submit">Login</button>
        </div>
      </form>
      <div class="note">Demo-Seite ohne echte Authentifizierung.</div>
    </main>
  </body>
</html>
