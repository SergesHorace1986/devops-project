apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-project
  namespace: dev
  labels:
    app: devops-project
spec:
  replicas: 1 # lightweight for dev
  selector:
    matchLabels:
      app: devops-project
  template:
    metadata:
      labels:
        app: devops-project
    spec:
      containers:
        - name: devops-project
          image: registry.gitlab.com/sergeshorace1986/devops-project:dev # dev-tag image
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: devops-project-config
            - secretRef:
                name: devops-project-secret
          # Optional: smaller delays for faster feedback
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always