image: node:$NODE_VERSION

variables:
  KUBE_NAMESPACE_dev: dev
  KUBE_NAMESPACE_prod: prod
  IP_DEV: 52.213.10.55
  IP_PROD: 52.213.10.55
  NODEPORT_DEV: 30000
  NODEPORT_PROD: 30001
  CI_REGISTRY_IMAGE: registry.gitlab.com/sergeshorace1986/devops-project

  NODE_VERSION: "20-alpine"

stages:
  - build
  - run
  - test
  - deploy-dev
  - deploy-prod

install:
  stage: build
  script:
    - echo "Install run.."
    - npm install
  after_script:
    - ls -la
  only:
    - dev
    - main

build:
  stage: build
  script:
    - echo "build run..."
    - npm run ci
  after_script:
    - ls -la
  only:
    - dev
    - main
  needs:
    - install

build-docker-image:
  stage: build
  image: docker:29.3.0-cli
  services:
    - docker:29.3-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker info
    # Login to the Gitlab Container registry
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # Build the container image
    - docker build -t "$CI_REGISTRY_IMAGE:latest" .
    # Tag the container image from latest to the commit ref
    - docker tag "$CI_REGISTRY_IMAGE:latest" "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    # Push the container image
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  needs:
    - build
  only:
    - dev
    - main

run:
  stage: run
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    # Build the container image
    - apk add --no-cache curl
    - docker run -d -p 80:3000 --name fastapi "$CI_REGISTRY_IMAGE:latest"
    - sleep 10
    - docker ps
    - docker logs fastapi
    - curl http://172.17.0.3
    - docker stop fastapi
    - docker rm fastapi
  needs:
    - build-docker-image

run-tests:
  stage: test
  script:
    - echo "test run.."
    - npm test
  needs:
    - run

deploy-dev:
  image: 
    name: alpine/helm:3.14.0
    entrypoint: [""]
  stage: deploy-dev
  environment:
    name: dev-$CI_BUILD_REF_NAME
    url: http://$IP_DEV:$NODEPORT_DEV
  variables:
    NAMESPACE: dev

  # Default branch leaves tag empty (= latest tag)
  # All other branches are tagged with the escaped branch name (commit ref slug)
  script:
    - rm -Rf ~/.kube
    - mkdir ~/.kube
    - ls
    - cat $KUBE_CONFIG > ~/.kube/config
    - chmod 600 ~/.kube/config
    - apk add --no-cache curl
    - curl -LO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl
    - mv kubectl /usr/local/bin/   
    - sed -i 's#https://127.0.0.1:6443#https://'"$IP_DEV"':6443#g' ~/.kube/config
    - curl -k https://$IP_DEV:6443/version
    - kubectl config set-cluster $(kubectl config get-clusters | tail -n 1) --insecure-skip-tls-verify=true
    - export KUBECONFIG=~/.kube/config
    - cp fastapi/values.yaml values.yml
    - helm upgrade --install app fastapi/ --values=values.yml --namespace $NAMESPACE --set image.repository="$CI_REGISTRY_IMAGE" --set image.tag="$CI_COMMIT_SHORT_SHA" --set service.nodeport="$NODEPORT_DEV" 

deploy-prod:
  image: 
    name: alpine/helm:3.14.0
    entrypoint: [""]
  stage: deploy-prod 
  when: manual
  environment:
    name: prod
    url: http://$IP_PROD:$NODEPORT_PROD
  variables:
    NAMESPACE: prod

  # Default branch leaves tag empty (= latest tag)
  # All other branches are tagged with the escaped branch name (commit ref slug)
  script:
    - rm -Rf ~/.kube
    - mkdir ~/.kube/
    - ls
    - cat $KUBE_CONFIG > ~/.kube/config
    - chmod 600 ~/.kube/config
    - apk add --no-cache curl
    - curl -LO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl
    - mv kubectl /usr/local/bin/ 
    - sed -i 's#https://127.0.0.1:6443#https://'"$IP_PROD"':6443#g' ~/.kube/config
    - curl -k https://$IP_PROD:6443/version
    - kubectl config set-cluster $(kubectl config get-clusters | tail -n 1) --insecure-skip-tls-verify=true
    - export KUBECONFIG=~/.kube/config
    - cp fastapi/values.yaml values.yml
    - helm upgrade --install app fastapi/ --values=values.yml --namespace $NAMESPACE --set image.repository="$CI_REGISTRY_IMAGE" --set image.tag="$CI_COMMIT_SHORT_SHA" --set service.nodeport="$NODEPORT_PROD"