variables:
  NODE_VERSION: "20-alpine"
  KUBE_NAMESPACE_dev: dev
  KUBE_NAMESPACE_prod: prod
  IP_DEV: 52.213.10.55
  IP_PROD: 52.213.10.55
  NODEPORT_DEV: 30000
  NODEPORT_PROD: 30001
  CI_REGISTRY_IMAGE: registry.gitlab.com/sergeshorace1986/devops-project

image: node:$NODE_VERSION  

stages:
  - build
  - run
  - test
  - deploy-dev
  - deploy-prod

# ── Cache: only install writes, all others pull ────────────────

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - node_modules/
  policy: pull-push

# ── Build stage ────────────────────────────────────────────────

install:
  stage: build
  script:
    - echo "Install running..."
    - npm install
  after_script:
    - ls -la
  only:
    - dev
    - main

build:
  stage: build
  script:
    - echo "build running..."
    - npm ci
  after_script:
    - ls -la
  only:
    - dev
    - main
  needs:
    - install

build-docker-image:
  stage: build
  image: docker:27.3.1
  services:
    - docker:27.3.1-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker info
    # Login to the Gitlab Container registry
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # Build the container image
    - docker build -t "$CI_REGISTRY_IMAGE:latest" .
    # Tag the container image from latest to the commit ref
    - docker tag "$CI_REGISTRY_IMAGE:latest" "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    # Push the container image
    - docker push "$CI_REGISTRY_IMAGE:latest"
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  needs:
    - build
  only:
    - dev
    - main

# ── Run stage ──────────────────────────────────────────────────

run:
  stage: run
  image: docker:27.3.1
  services:
    - docker:27.3.1-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # Build the container image
    - apk add --no-cache curl
    - docker run -d -p 3000:3000 --name fastapi "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - sleep 10
    - docker ps
    - docker logs fastapi
    - curl http://docker:3000
    - docker stop fastapi && docker rm fastapi  
  needs:
    - build-docker-image
  only:
    - dev
    - main

# ── Test stage ─────────────────────────────────────────────────

run-tests:
  stage: test
  script:
    - echo "test running..."
    - npm test
  needs:
    - run
  only:
    - dev
    - main

# ── Deploy template (shared between dev and prod) ──────────────

.deploy_template: &deploy_template
  image: 
    name: alpine/helm:3.14.0
    entrypoint: [""]
  script:
    - rm -Rf ~/.kube && mkdir ~/.kube
    - install -m 600 /dev/null ~/.kube/config
    - cat $KUBE_CONFIG > ~/.kube/config
    - apk add --no-cache curl
    - curl -LO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/ 
    - sed -i "s#https://[0-9.]*:6443#https://$DEPLOY_IP:6443#g" ~/.kube/config
    - grep server ~/.kube/config
    - curl -k https://$DEPLOY_IP:6443/version
    - kubectl config set-cluster $(kubectl config get-clusters | tail -n 1) --insecure-skip-tls-verify=true
    - export KUBECONFIG=~/.kube/config
    - kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
    - kubectl apply -f k8s/$NAMESPACE/configmap.yaml
    - cp fastapi/values.yaml values.yml
    - helm upgrade --install app fastapi/
        --values=values.yml
        --namespace $NAMESPACE
        --set image.repository="$CI_REGISTRY_IMAGE"
        --set image.tag="$CI_COMMIT_SHORT_SHA"
        --set service.nodeport="$NODEPORT"

# ── Deploy Dev ─────────────────────────────────────────────────

deploy-dev:
  <<: *deploy_template
  stage: deploy-dev
  environment:
    name: dev-$CI_COMMIT_REF_NAME
    url: http://$IP_DEV:$NODEPORT_DEV
  variables:
    NAMESPACE: dev
    DEPLOY_IP: $IP_DEV
    NODEPORT: $NODEPORT_DEV
  needs:
    - run-tests
  only:
    - dev

# ── Deploy Prod ────────────────────────────────────────────────

deploy-prod:
  <<: *deploy_template
  stage: deploy-prod 
  when: manual
  environment:
    name: prod
    url: http://$IP_PROD:$NODEPORT_PROD
  variables:
    NAMESPACE: prod
    DEPLOY_IP: $IP_PROD
    NODEPORT: $NODEPORT_PROD
  needs:
    - run-tests
  only:
    - main
