apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-environment
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: production-environment
  template:
    metadata:
      labels:
        app: production-environment
    spec:
      containers:
      - name: prod-app
        image: registry.gitlab.com/sergeshorace1986/devops-project:latest
        ports:
        - containerPort: 3000